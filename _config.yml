theme: jekyll-theme-chirpy

lang: en
timezone: America/New_York

title: Interview Preparation Guide
tagline: Crack FAANG & Top Tech Interviews
description: >-
  Comprehensive guide with 120+ topics covering DSA, System Design,
  HR rounds, Behavioral interviews, and more.

url: "https://shubhu-io.github.io"
baseurl: "/interview-preparation-guide"

github:
  username: shubhu-io

social:
  name: Shubh
  links:
    - https://github.com/shubhu-io

avatar: "/commons/avatar.jpg"
toc: true
theme_mode: # light or dark

paginate: 10

pwa:
  enabled: true
  cache:
    enabled: true

comments:
  provider: # giscus

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

