# =============================================================================
# Interview Preparation Guide - zer0-mistakes Theme Configuration
# =============================================================================

site_configured          : true
founder                  : "Shubh"
remote_theme             : "bamr87/zer0-mistakes"

## GitHub Information
github_user              : &github_user "shubhu-io"
repository_name          : &github_repository "interview-preparation-guide"
repository               : [*github_user, "/", *github_repository]
local_repo               : &local_repo "interview-preparation-guide"
branch                   : &branch "master"

## Site Information
title                    : &title "Interview Preparation Guide"
title_url                : "/"
title_icon               : "bi-book"
subtitle                 : "Crack FAANG & Top Tech Interviews"
subtitle_icon            : "bi-trophy"
title_separator          : "|"
url                      : &url "https://shubhu-io.github.io"
baseurl                  : &baseurl "/interview-preparation-guide"
domain                   : &domain "github"
domain_ext               : &domain_ext "io"
public_folder            : assets
port                     : 4000
og_image                 : /assets/images/og-interview.svg

### Owner Information
name                     : &name "Shubh"
email                    : ""
description              : >-
  Comprehensive guide with 120+ topics covering DSA, System Design,
  HR rounds, Behavioral interviews, and more. Track your progress
  and master every topic for FAANG & top tech interviews.

## Personalization
locale                   : "en-US"
logo                     : /assets/images/logo.svg
logo_link                : [*url, *baseurl]
teaser                   : /assets/images/og-interview.svg

favicon:
  ico                    : /assets/images/favicon.svg
  apple_touch            : /assets/images/logo.svg

## UI Settings
color_mode_default       : auto
appearance_panel         : true
theme_skin               : "air"

theme_color:
  main         : "#667eea"
  secondary    : "#764ba2"
  blue         : "#667eea"
  purple       : "#764ba2"
  green        : "#28a745"
  red          : "#dc3545"
  orange       : "#fd7e14"
  teal         : "#376986"
  indigo       : "#6610f2"

## Navigation Behaviour
breadcrumbs              : true
words_per_minute         : 200
_posts_file_structure    : "year-month-day-title.md"

sidebar:
  title                  : "Browse Topics"
  icon                   : "bi-journal-bookmark"

## Author
author:
  name                   : *name
  avatar                 : false
  bio                    : "Interview preparation guide with 120+ topics"
  location               : ""
  github_username        : *github_user

## Links
links:
  - label: "GitHub"
    icon: "bi-github"
    url: "https://github.com/shubhu-io"

## Build Settings
markdown: kramdown
permalink: pretty

kramdown:
  input: GFM
  toc_levels: 1..6

collections_dir: &collections_dir pages

collections:
  pages:
    output: true
    permalink: /:collection/:name/
  posts:
    output: true
    permalink: /posts/:name/
  docs:
    output: true
    title: Documentation
    icon: bi-journal-text
    permalink: /:collection/:categories/:name/

## Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: root
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true

  - scope:
      path: pages
    values:
      layout: default
      author_profile: true
      read_time: true
      share: true
      related: true
      toc_sticky: true
      sidebar:
        nav: categories
    permalink: /:path/:name/

  - scope:
      path: pages/_posts
    values:
      layout: article
      post_type: standard
      index: false
      sidebar: true
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

## Plugins
plugins:
  - github-pages
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-include-cache


## Pagination
paginate: 10
paginate_path: "/page/:num/"

## Nanobar (loading progress)
nanobar:
  enabled       : true
  color         : "var(--bs-primary)"
  background    : "transparent"
  height        : "3px"
  position      : "navbar"
  z_index       : 9999
  steps         : [20, 55, 85, 100]
  step_delay_ms : 180

## Search
search_enabled: true

## Mermaid
mermaid:
  src: '/assets/vendor/mermaid/mermaid.min.js'

## Sass
sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

## Copyright
cr_year: 2024
cr_entity: *name
cr_lisense: "MIT"

## Sitemap
sitemap_include: ["html", "xml"]

## Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - .obsidian/
  - "*.canvas"
  - ".cursor/"
  - ".devcontainer/"
  - ".github/"
  - ".vscode/"
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - package.json
  - package-lock.json
  - scripts/
  - "*.sh"
  - docker/
  - docker-compose.yml
  - Makefile
  - Rakefile
  - AGENTS.md
  - vendor
