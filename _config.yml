title: Interview Preparation Guide
description: Comprehensive guide to cracking technical interviews at FAANG, top startups, and MNCs
remote_theme: just-the-docs/just-the-docs@v0.10.0

url: https://shubhu-io.github.io
baseurl: /interview-preparation-guide

color_scheme: dark

aux_links:
  "GitHub":
    - "https://github.com/shubhu-io/interview-preparation-guide"

nav_sort: case_insensitive

heading_anchors: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Comprehensive interview preparation resource. Contributed by the community.

search_enabled: true
search.heading_level: 3

callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  danger:
    title: Danger
    color: red

exclude:
  - node_modules/
  - .git/
